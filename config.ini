[input]
path=archaeology_dig_site.csv
encoding=
source_crs=EPSG:3857
target_crs=EPSG:3857

[output]
dir=output
export=gpkg,geojson
write_summary=true
write_quality=true

[processing]
connect_codes=BASE,STAIN_01,STAIN_11,STAIN_12,STAIN_02,STAIN_21,STAIN_22
annotate_prefixes=FIND_
center_point_id=
center_code=
center_description_keywords=центр,center

[quality]
profile=standard
max_z_sigma=3.5
max_planar_jump=5.0
min_point_spacing=0.2

[plots]
title=Archaeological Survey
enabled=true
basemap=false
basemap_provider=OpenStreetMap.Mapnik
show=false
interactive_3d=true
